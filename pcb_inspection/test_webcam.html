<!DOCTYPE html>
<html>
<head>
    <title>PCB Webcam Test</title>
</head>
<body>
    <h1>PCB Webcam Inspector - Test</h1>
    <p>Server running on: <a href="http://localhost:8082/webcam" target="_blank">http://localhost:8082/webcam</a></p>

    <button onclick="testInspect()">Test Inspection</button>
    <div id="result"></div>

    <script>
        async function testInspect() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                // Create a simple test image (red square)
                const canvas = document.createElement('canvas');
                canvas.width = 100;
                canvas.height = 100;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'red';
                ctx.fillRect(0, 0, 100, 100);

                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));

                const formData = new FormData();
                formData.append('file', blob, 'test.jpg');

                const response = await fetch('http://localhost:8082/inspect', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    resultDiv.innerHTML = `
                        <h2>✅ Success!</h2>
                        <p>Pass: ${result.pass}</p>
                        <p>Defects: ${result.defects.length}</p>
                        <p>Anomaly Score: ${result.anomaly_score}</p>
                        <p>Latency: ${result.latency_ms}ms</p>
                        ${result.defects.length > 0 ? '<h3>Defects:</h3>' + result.defects.map(d =>
                            `<p>${d.class}: ${d.confidence}</p>`
                        ).join('') : '<p>No defects detected</p>'}
                    `;
                } else {
                    resultDiv.innerHTML = `❌ Error: ${response.status}`;
                }
            } catch (e) {
                resultDiv.innerHTML = `❌ Error: ${e.message}`;
            }
        }
    </script>
</body>
</html>
